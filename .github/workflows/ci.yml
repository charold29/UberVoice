name: CI

on:
  push:
    paths:
      - 'UberVoiceCore/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'UberVoiceCore/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: UberVoiceCore

    steps:
      - uses: actions/checkout@v5

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
