name: CI

on:
  push:
    paths:
      - 'UberVoiceCore/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'UberVoiceCore/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: UberVoiceCore

    steps:
      - uses: actions/checkout@v5

      # Caché de artefactos de SwiftPM para builds incrementales.
      # Hit exacto si no cambió ningún fuente/manifiesto; si cambió un .swift,
      # restore-keys reusa el .build previo y solo recompila lo afectado.
      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: UberVoiceCore/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('UberVoiceCore/Package.swift', 'UberVoiceCore/Package.resolved', 'UberVoiceCore/Sources/**/*.swift', 'UberVoiceCore/Tests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
